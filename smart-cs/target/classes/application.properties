spring.application.name=smart-cs

# 服务器端口
server.port=8080

# 通义千问大模型配置 (兼容 OpenAI 格式)
qwen.api.key=sk-dd6f3ac26bc94d1395cc6811e7a8194b
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1
qwen.model.name=qwen-plus

# ----------------- Database (H2) & JPA -----------------
spring.datasource.url=jdbc:h2:mem:smartcs_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
